name: Keep Backend Alive

on:
  schedule:
    - cron: "0/30 * * * *" # Runs once per day at midnight UTC
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /db-health endpoint
        run: |
          curl -s -o /dev/null -w "Status: %{http_code}\n" \
            "https://once-app-qdwh.onrender.com/db-health"
          echo "Ping sent at $(date)"
